name: Compile Android Plugin

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Android NDK
      uses: nttld/setup-ndk@v1
      with:
        ndk-version: r26b

    - name: Compile libentityculler.so
      run: |
        $ANDROID_NDK_HOME/toolchains/llvm/prebuilt/linux-x86_64/bin/aarch64-linux-android34-clang++ \
          -shared -fPIC -O2 \
          -I./src \
          src/main.cpp \
          -o libentityculler.so \
          -llog

    - name: Package Mod and Structure Splash Folder
      run: |
        # Ensure texts folder is preserved
        mkdir -p texts
        cp splashes.json texts/ || cp texts/splashes.json texts/ || true
        zip -r EntityCuller.levipack.zip manifest.json libentityculler.so texts/

    - name: Upload Temporary Artifact
      uses: actions/upload-artifact@v4
      with:
        name: EntityCuller-Plugin
        path: EntityCuller.levipack.zip

    - name: Create Public Release Link
      uses: softprops/action-gh-release@v2
      with:
        tag_name: "v1.0.${{ github.run_number }}"
        name: "EntityCuller Release v1.0.${{ github.run_number }}"
        body: "Download the compiled EntityCuller.levipack.zip below and open it directly inside LeviLauncher!"
        files: EntityCuller.levipack.zip
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
